services:
  backend:
    build:
      context: ./backend-ts
      dockerfile: Dockerfile
    container_name: conversia-backend
    depends_on:
      - postgres
      - redis
    environment:
      PORT: 8000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/conversia}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8000:8000"

  postgres:
    image: postgres:16-alpine
    container_name: conversia-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: conversia
    ports:
      - "5432:5432"
    volumes:
      - conversia_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: conversia-redis
    ports:
      - "6379:6379"

volumes:
  conversia_pgdata:

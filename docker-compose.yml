services:
  postgres:
    image: postgres:16-alpine
    container_name: conversia-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: conversia
    ports:
      - "5432:5432"
    volumes:
      - conversia_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: conversia-redis
    ports:
      - "6379:6379"

volumes:
  conversia_pgdata:
